<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flash Anzan — MathArcade</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .flash-number {
      font-family: 'Varela Round', monospace;
      font-size: clamp(60px, 12vw, 140px);
      font-weight: 900;
      text-align: center;
      transition: opacity 0.1s;
      min-height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 4px;
      text-shadow: 0 0 30px currentColor, 0 0 60px currentColor;
    }
    .flash-op {
      font-size: 48px;
      color: var(--neon-pink);
      text-shadow: 0 0 20px var(--neon-pink);
      margin-right: 12px;
    }
    .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
    .answer-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      max-width: 400px;
      margin: 0 auto;
    }
    .big-answer-input {
      font-family: 'Varela Round', monospace;
      font-size: 32px;
      font-weight: 700;
      background: transparent;
      border: none;
      border-bottom: 4px solid var(--neon-green);
      color: var(--neon-green);
      text-align: center;
      outline: none;
      width: 100%;
      padding: 8px;
      text-shadow: 0 0 10px var(--neon-green);
    }
    .question-counter {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .q-dot {
      width: 12px; height: 12px;
      border: 2px solid var(--neon-green);
      transition: background 0.2s;
    }
    .q-dot.done { background: var(--neon-green); }
    .q-dot.current { background: var(--neon-yellow); border-color: var(--neon-yellow); animation: blink 0.5s step-end infinite; }
    .q-dot.correct { background: var(--neon-green); border-color: var(--neon-green); }
    .q-dot.wrong { background: var(--neon-pink); border-color: var(--neon-pink); }
    .flash-op-label {
      font-size: 8px;
      letter-spacing: 3px;
      margin-bottom: 6px;
    }
    #phase-display {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-align: center;
      min-height: 20px;
    }
  </style>
</head>
<body>
<div class="crt-corner tl"></div><div class="crt-corner tr"></div>
<div class="crt-corner bl"></div><div class="crt-corner br"></div>

<nav class="navbar">
  <div class="navbar-brand"><span class="neon-green">MATH</span><span class="neon-cyan">ARCADE</span></div>
  <ul class="navbar-nav">
    <li><a href="../index.html">← HOME</a></li>
    <li><span class="neon-green" style="font-size:9px;">⚡ FLASH ANZAN</span></li>
    <li id="nav-user"></li>
  </ul>
</nav>

<!-- HUD -->
<div class="game-hud" id="hud" style="display:none;">
  <div class="hud-item"><div class="hud-label">SCORE</div><div class="hud-value neon-green" id="hud-score">0</div></div>
  <div class="hud-item"><div class="hud-label">ROUND</div><div class="hud-value neon-cyan" id="hud-round">1/10</div></div>
  <div class="hud-item"><div class="hud-label">CORRECT</div><div class="hud-value neon-yellow" id="hud-correct">0</div></div>
  <div class="hud-item"><div class="hud-label">TIME</div><div class="hud-value neon-pink" id="hud-time">0s</div></div>
</div>

<!-- SETTINGS SCREEN -->
<div id="screen-settings" style="max-width:700px;margin:40px auto;padding:20px;">
  <div class="pixel-box" style="padding:32px;">
    <h1 class="neon-green text-center" style="font-size:18px;margin-bottom:8px;">⚡ FLASH ANZAN</h1>
    <p class="vt323 text-center" style="font-size:22px;color:var(--text-dim);margin-bottom:30px;">
      Numbers flash fast — calculate in your head!
    </p>

    <div class="settings-grid">
      <div class="form-group">
        <label>OPERATION</label>
        <select class="pixel-input" id="op-select">
          <option value="add">➕ ADDITION</option>
          <option value="sub">➖ SUBTRACTION</option>
          <option value="mul">✖️  MULTIPLICATION</option>
          <option value="mixed">🔀 MIXED</option>
        </select>
      </div>
      <div class="form-group">
        <label>MAX DIGITS PER NUMBER</label>
        <select class="pixel-input" id="digits-select">
          <option value="1">1 DIGIT (1-9)</option>
          <option value="2" selected>2 DIGITS (10-99)</option>
          <option value="3">3 DIGITS</option>
          <option value="4">4 DIGITS</option>
          <option value="5">5 DIGITS</option>
          <option value="6">6 DIGITS</option>
          <option value="7">7 DIGITS</option>
          <option value="8">8 DIGITS</option>
          <option value="9">9 DIGITS</option>
          <option value="10">10 DIGITS</option>
        </select>
      </div>
      <div class="form-group">
        <label>NUMBERS PER ROUND</label>
        <select class="pixel-input" id="count-select">
          <option value="3">3 NUMBERS</option>
          <option value="5" selected>5 NUMBERS</option>
          <option value="7">7 NUMBERS</option>
          <option value="10">10 NUMBERS</option>
          <option value="15">15 NUMBERS</option>
        </select>
      </div>
      <div class="form-group">
        <label>FLASH DURATION (ms)</label>
        <select class="pixel-input" id="dur-select">
          <option value="500">0.5s — LIGHTNING ⚡</option>
          <option value="1000" selected>1.0s — FAST</option>
          <option value="1500">1.5s — NORMAL</option>
          <option value="2000">2.0s — SLOW</option>
          <option value="3000">3.0s — BEGINNER</option>
        </select>
      </div>
      <div class="form-group">
        <label>ROUNDS</label>
        <select class="pixel-input" id="rounds-select">
          <option value="5">5 ROUNDS</option>
          <option value="10" selected>10 ROUNDS</option>
          <option value="15">15 ROUNDS</option>
          <option value="20">20 ROUNDS</option>
        </select>
      </div>
    </div>

    <div class="text-center mt-30">
      <button class="btn btn-green btn-lg" id="btn-start">▶ START GAME</button>
    </div>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="screen-game" class="hidden" style="max-width:700px;margin:20px auto;padding:20px;">
  <div class="pixel-box" style="padding:28px;text-align:center;">
    <div id="phase-display">GET READY...</div>
    <div id="flash-display" class="flash-number neon-green">-</div>
    <div class="question-counter" id="q-counter" style="justify-content:center;margin:16px 0;"></div>
    <div class="timer-bar-container" style="margin:0 auto;max-width:400px;">
      <div class="timer-bar" id="flash-timer-bar" style="width:100%;"></div>
    </div>
  </div>
</div>

<!-- ANSWER TIMER (FIXED TOP LEFT) -->
<div id="flash-answer-timer-container" class="hidden" style="position:fixed;top:80px;left:20px;text-align:center;z-index:900;opacity:0.8;">
  <div style="font-size:24px;margin-bottom:2px;">⏱️</div>
  <div id="flash-answer-timer" class="neon-yellow" style="font-family:'Varela Round',monospace;font-size:14px;letter-spacing:1px;text-shadow:0 0 10px rgba(0,0,0,0.8);">0.00s</div>
</div>

<!-- ANSWER SCREEN -->
<div id="screen-answer" class="hidden" style="max-width:500px;margin:40px auto;padding:20px;">
  <div class="pixel-box" style="padding:32px;text-align:center;">
    <div style="font-size:9px;color:var(--neon-cyan);margin-bottom:4px;letter-spacing:3px;">WHAT'S THE TOTAL?</div>
    <div class="vt323" style="font-size:18px;color:var(--text-dim);margin-bottom:20px;">Recall all the numbers you saw and calculate!</div>
    <div class="answer-box">
      <input class="big-answer-input" type="number" id="answer-input" placeholder="?"/>
      <button class="btn btn-green btn-lg" id="btn-submit">✓ SUBMIT</button>
    </div>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div id="screen-results" class="hidden" style="max-width:600px;margin:30px auto;padding:20px;">
  <div class="pixel-box" style="padding:32px;text-align:center;">
    <div id="result-emoji" style="font-size:64px;margin-bottom:16px;"></div>
    <div id="result-title" class="neon-green" style="font-size:20px;margin-bottom:12px;"></div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:24px 0;">
      <div class="pixel-box cyan-box" style="padding:14px;">
        <div style="font-size:7px;color:var(--text-dim);margin-bottom:6px;">SCORE</div>
        <div id="final-score" class="neon-green" style="font-size:24px;font-family:'Varela Round',monospace;"></div>
      </div>
      <div class="pixel-box" style="padding:14px;">
        <div style="font-size:7px;color:var(--text-dim);margin-bottom:6px;">CORRECT</div>
        <div id="final-correct" class="neon-yellow" style="font-size:24px;font-family:'Varela Round',monospace;"></div>
      </div>
      <div class="pixel-box pink-box" style="padding:14px;">
        <div style="font-size:7px;color:var(--text-dim);margin-bottom:6px;">TIME</div>
        <div id="final-time" class="neon-pink" style="font-size:20px;font-family:'Varela Round',monospace;"></div>
      </div>
    </div>
    <div id="result-breakdown" class="question-counter" style="margin:16px 0;"></div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:16px;">
      <button class="btn btn-green" id="btn-play-again">▶ PLAY AGAIN</button>
      <a href="../pages/leaderboard.html" class="btn btn-cyan">🏆 LEADERBOARD</a>
      <a href="../index.html" class="btn btn-pink">← HOME</a>
    </div>
  </div>
</div>

<script src="../js/core.js"></script>
<script>
  const { randomInt, randomDigits, showNotif, Leaderboard, Session } = MathArcade;
  const session = Session.get();
  document.getElementById('nav-user').innerHTML = session ?
    `<span style="color:var(--neon-yellow);font-size:7px">${session.name}</span>` : '';

  let config = {};
  let gameNumbers = [];
  let gameOps = [];
  let currentFlashIdx = 0;
  let flashTimer = null;
  let roundResults = [];
  let gameStartTime = 0;
  let totalRounds = 10;
  let currentRound = 0;
  let score = 0;
  let correctCount = 0;
  let answerStartTime = 0;
  let answerTimerInterval = null;

  const ops = {
    add: { sym: '+', fn: (a, b) => a + b },
    sub: { sym: '-', fn: (a, b) => a - b },
    mul: { sym: '×', fn: (a, b) => a * b }
  };

  document.getElementById('btn-start').addEventListener('click', startGame);
  document.getElementById('btn-submit').addEventListener('click', submitAnswer);
  document.getElementById('btn-play-again').addEventListener('click', () => {
    document.getElementById('screen-results').classList.add('hidden');
    document.getElementById('screen-settings').classList.remove('hidden');
  });
  document.getElementById('answer-input').addEventListener('keydown', e => { if (e.key === 'Enter') submitAnswer(); });

  function startGame() {
    if (MathArcade.Audio) MathArcade.Audio.playCoin();
    config = {
      op: document.getElementById('op-select').value,
      digits: parseInt(document.getElementById('digits-select').value),
      count: parseInt(document.getElementById('count-select').value),
      dur: parseInt(document.getElementById('dur-select').value),
      rounds: parseInt(document.getElementById('rounds-select').value)
    };
    totalRounds = config.rounds;
    currentRound = 0;
    score = 0;
    correctCount = 0;
    roundResults = [];
    gameStartTime = Date.now();

    document.getElementById('screen-settings').classList.add('hidden');
    document.getElementById('hud').style.display = 'flex';
    updateHUD();
    nextRound();
  }

  function nextRound() {
    if (currentRound >= totalRounds) { showResults(); return; }
    currentRound++;
    updateHUD();

    // Generate numbers & ops
    const opKey = config.op === 'mixed'
      ? ['add','sub','mul'][randomInt(0,2)]
      : config.op;

    gameNumbers = [];
    gameOps = [];
    let running = randomDigits(config.digits);
    gameNumbers.push(running);
    for (let i = 1; i < config.count; i++) {
      const n = randomDigits(config.digits);
      gameNumbers.push(n);
      const thisOp = config.op === 'mixed' ? ['add','sub','mul'][randomInt(0,2)] : opKey;
      gameOps.push(thisOp);
    }

    // Build counter dots
    const counter = document.getElementById('q-counter');
    counter.innerHTML = '';
    for (let i = 0; i < config.count; i++) {
      const d = document.createElement('div');
      d.className = 'q-dot' + (i === 0 ? ' current' : '');
      d.id = `qdot-${i}`;
      counter.appendChild(d);
    }

    currentFlashIdx = 0;
    document.getElementById('screen-game').classList.remove('hidden');
    document.getElementById('screen-answer').classList.add('hidden');
    document.getElementById('phase-display').textContent = `ROUND ${currentRound} OF ${totalRounds} — WATCH CAREFULLY!`;
    flashNext();
  }

  let flashTimeout = null;
  function flashNext() {
    const el = document.getElementById('flash-display');
    const bar = document.getElementById('flash-timer-bar');

    // Update dots
    for (let i = 0; i < gameNumbers.length; i++) {
      const d = document.getElementById(`qdot-${i}`);
      if (d) d.className = 'q-dot' + (i === currentFlashIdx ? ' current' : i < currentFlashIdx ? ' done' : '');
    }

    // Color by operation
    const colors = { add: 'var(--neon-green)', sub: 'var(--neon-cyan)', mul: 'var(--neon-pink)' };
    let displayOp = '';
    let color = 'var(--neon-green)';
    if (currentFlashIdx === 0) {
      el.innerHTML = `<span style="color:${color}">${gameNumbers[0]}</span>`;
    } else {
      const op = gameOps[currentFlashIdx - 1];
      color = colors[op] || 'var(--neon-green)';
      el.innerHTML = `<span class="flash-op">${ops[op].sym}</span><span style="color:${color}">${gameNumbers[currentFlashIdx]}</span>`;
    }
    if (MathArcade.Audio) MathArcade.Audio.playBlip();

    // Timer bar animation
    bar.style.transition = 'none';
    bar.style.width = '100%';
    bar.style.background = `linear-gradient(90deg, ${color}, #fff)`;
    setTimeout(() => {
      bar.style.transition = `width ${config.dur}ms linear`;
      bar.style.width = '0%';
    }, 50);

    flashTimeout = setTimeout(() => {
      el.style.opacity = '0';
      setTimeout(() => {
        el.style.opacity = '1';
        currentFlashIdx++;
        if (currentFlashIdx < gameNumbers.length) flashNext();
        else showAnswerScreen();
      }, 150);
    }, config.dur);
  }

  function showAnswerScreen() {
    document.getElementById('screen-game').classList.add('hidden');
    document.getElementById('screen-answer').classList.remove('hidden');
    document.getElementById('phase-display').textContent = '';
    
    document.getElementById('flash-answer-timer-container').classList.remove('hidden');
    answerStartTime = Date.now();
    const timerEl = document.getElementById('flash-answer-timer');
    timerEl.textContent = '0.00s';
    answerTimerInterval = setInterval(() => {
      timerEl.textContent = ((Date.now() - answerStartTime) / 1000).toFixed(2) + 's';
    }, 50);

    // Do NOT show the sequence — students must recall from memory
    const inp = document.getElementById('answer-input');
    inp.value = '';
    inp.focus();
  }

  function submitAnswer() {
    if (answerTimerInterval) clearInterval(answerTimerInterval);
    const inp = document.getElementById('answer-input');
    const userAnswer = parseInt(inp.value);
    if (isNaN(userAnswer)) {
      showNotif('ENTER A NUMBER!', 'pink');
      // restart timer if error
      answerTimerInterval = setInterval(() => {
        document.getElementById('flash-answer-timer').textContent = ((Date.now() - answerStartTime) / 1000).toFixed(2) + 's';
      }, 50);
      return; 
    }

    document.getElementById('flash-answer-timer-container').classList.add('hidden');

    // Calculate correct
    let correct = gameNumbers[0];
    for (let i = 0; i < gameOps.length; i++) correct = ops[gameOps[i]].fn(correct, gameNumbers[i+1]);

    const isCorrect = userAnswer === correct;
    if (isCorrect) {
      if (MathArcade.Audio) MathArcade.Audio.playCorrect();
      score += 100 + Math.floor(1000 / config.dur * 10);
      correctCount++;
      showNotif('✓ CORRECT!', 'green');
    } else {
      if (MathArcade.Audio) MathArcade.Audio.playWrong();
      showNotif(`✗ WRONG! ANSWER: ${correct}`, 'pink');
    }
    roundResults.push(isCorrect);
    updateHUD();
    nextRound();
  }

  function updateHUD() {
    document.getElementById('hud-score').textContent = score;
    document.getElementById('hud-round').textContent = `${currentRound}/${totalRounds}`;
    document.getElementById('hud-correct').textContent = correctCount;
    document.getElementById('hud-time').textContent = gameStartTime ? ((Date.now() - gameStartTime) / 1000).toFixed(1) + 's' : '0s';
  }

  function showResults() {
    document.getElementById('screen-game').classList.add('hidden');
    document.getElementById('screen-answer').classList.add('hidden');
    document.getElementById('screen-results').classList.remove('hidden');
    document.getElementById('hud').style.display = 'none';

    const pct = Math.round(correctCount / totalRounds * 100);
    const timeMs = Date.now() - gameStartTime;
    const emoji = pct >= 80 ? '🏆' : pct >= 60 ? '⭐' : pct >= 40 ? '💪' : '😅';
    const title = pct >= 80 ? 'AMAZING!' : pct >= 60 ? 'GREAT JOB!' : pct >= 40 ? 'KEEP TRAINING!' : 'PRACTICE MORE!';

    if (MathArcade.Audio) {
      if (pct >= 60) MathArcade.Audio.playWin();
      else setTimeout(() => MathArcade.Audio.playWrong(), 200);
    }

    document.getElementById('result-emoji').textContent = emoji;
    document.getElementById('result-title').textContent = title;
    document.getElementById('final-score').textContent = score;
    document.getElementById('final-correct').textContent = `${correctCount}/${totalRounds}`;
    document.getElementById('final-time').textContent = (timeMs/1000).toFixed(1) + 's';

    const breakdown = document.getElementById('result-breakdown');
    breakdown.innerHTML = roundResults.map((r, i) =>
      `<div class="q-dot ${r ? 'correct' : 'wrong'}" title="Round ${i+1}: ${r ? 'correct' : 'wrong'}"></div>`
    ).join('');

    // Submit to leaderboard
    Leaderboard.submit('flash-anzan', score, {
      correct: correctCount, total: totalRounds,
      timeTaken: timeMs, pct
    });
  }
</script>
</body>
</html>
